<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ใบบันทึกสรุปน้ำหนักข้าวโพด (A5 2 คอลัมน์)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f0f2f5;
            color: #000;
        }
        .wrapper {
            max-width: 1000px;
            margin: 0 auto;
        }
        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 10px;
        }
        .btn {
            padding: 8px 16px;
            font-size: 15px;
            font-family: 'Sarabun', sans-serif;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-pdf { background-color: #dc3545; color: white; }
        .btn-pdf:hover { background-color: #bd2130; }
        .btn-save { background-color: #28a745; color: white; }
        .btn-save:hover { background-color: #218838; }

        .document-page {
            background: white;
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .form-header {
            text-align: center;
            margin-bottom: 8px;
        }
        .form-title {
            font-size: 20px;
            font-weight: bold;
            margin: 0 0 5px 0;
        }
        .meta-container {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .meta-field {
            display: flex;
            align-items: flex-end;
        }
        .meta-field label {
            white-space: nowrap;
            margin-right: 5px;
        }
        .meta-field input {
            border: none;
            border-bottom: 1.5px dotted #333;
            padding: 1px 3px;
            font-size: 14px;
            font-family: 'Sarabun', sans-serif;
            width: 100%;
            outline: none;
            background: transparent;
        }
        
        /* 👥 แสดงผลเป็น 2 คอลัมน์ (ซ้าย-ขวา) ทั้งบนหน้าจอเว็บและใน PDF */
        .grid-layout {
            display: flex;
            gap: 12px;
        }
        .table-section {
            flex: 1;
            border: 1.5px solid #000000;
            border-radius: 3px;
            overflow: hidden;
        }
        .section-title {
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            padding: 4px;
            background-color: #f8f9fa;
            border-bottom: 1.5px solid #000000;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #000000;
            padding: 3px 2px;
            text-align: center;
            font-size: 12px;
        }
        th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        td {
            height: 22px; /* ล็อกความสูงให้พอดีกับสัดส่วน A5 */
        }
        td input {
            width: 100%;
            height: 100%;
            border: 1px solid #ccc;
            border-radius: 2px;
            padding: 1px;
            text-align: center;
            font-size: 12px;
            font-family: 'Sarabun', sans-serif;
            background-color: #fff;
        }
        td input[type="date"] {
            font-size: 10.5px;
            padding: 1px;
            cursor: pointer;
        }
        td input:focus {
            border-color: #007bff;
            outline: none;
            background-color: #f4f8ff;
        }
        .total-row {
            font-weight: bold;
            background-color: #fffde7;
        }
        .total-row td {
            border-top: 1.5px solid #000000;
        }
        .total-label {
            text-align: left;
            padding-left: 5px;
        }
        .footer-line {
            margin-top: 10px;
            border-bottom: 1.5px dotted #999;
            width: 100%;
        }

        /* ----------------------------------------------------
           🔥 การตั้งค่าพิเศษบังคับให้ลง A5 แผ่นเดียวเมื่อออกเป็น PDF
        ---------------------------------------------------- */
        @media print {
