<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ใบบันทึกสรุปน้ำหนักข้าวโพด (ขนาด A5)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #f0f2f5;
            color: #000;
        }
        .wrapper {
            max-width: 800px; /* บีบหน้าจอเว็บบนคอมพิวเตอร์ให้อารมณ์ขนาดกะทัดรัดแบบ A5 */
            margin: 0 auto;
        }
        /* แถบปุ่มคอนโทรลด้านบนเว็บแอป */
        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 8px;
        }
        .btn {
            padding: 6px 14px;
            font-size: 14px;
            font-family: 'Sarabun', sans-serif;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-pdf { background-color: #dc3545; color: white; }
        .btn-pdf:hover { background-color: #bd2130; }
        .btn-save { background-color: #28a745; color: white; }
        .btn-save:hover { background-color: #218838; }

        /* จัดขนาดพื้นที่การดีไซน์เอกสารให้เข้าสัดส่วนขนาดกระดาษ A5 (ครึ่งหนึ่งของ A4) */
        .document-page {
            background: white;
            padding: 15px 20px;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .form-header {
            text-align: center;
            margin-bottom: 5px;
        }
        .form-title {
            font-size: 18px; /* ปรับขนาดหัวข้อให้เล็กลงสัมพันธ์กับ A5 */
            font-weight: bold;
            margin: 0 0 5px 0;
        }
        /* ส่วนกรอกข้อมูลสมาชิก */
        .meta-container {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .meta-field {
            display: flex;
            align-items: flex-end;
        }
        .meta-field label {
            white-space: nowrap;
            margin-right: 5px;
        }
        .meta-field input {
            border: none;
            border-bottom: 1.5px dotted #333;
            padding: 1px 3px;
            font-size: 13px;
            font-family: 'Sarabun', sans-serif;
            width: 100%;
            outline: none;
            background: transparent;
        }
        /* การจัดวางแบ่งตารางฝั่ง ซ้าย-ขวา */
        .grid-layout {
            display: flex;
            gap: 10px;
        }
        .table-section {
            flex: 1;
            border: 1.5px solid #000000;
            border-radius: 3px;
            overflow: hidden;
        }
        .section-title {
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            padding: 3px;
            background-color: #f8f9fa;
            border-bottom: 1.5px solid #000000;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #000000;
            padding: 3px 2px;
            text-align: center;
            font-size: 11px; /* ขนาดฟอนต์ย่อลงสำหรับกระดาษแผ่นเล็ก */
        }
        th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        td {
            height: 20px; /* ลดความสูงของแถวลงเพื่อให้ยัดครบทั้ง 12 แถวในหน้า A5 แผ่นเดียวได้ */
        }
        /* กล่องอินพุตสำหรับพิมพ์ตัวเลขและกดปฏิทิน */
        td input {
            width: 100%;
            height: 100%;
            border: 1px solid #ccc;
            border-radius: 2px;
            padding: 1px;
            text-align: center;
            font-size: 11px;
            font-family: 'Sarabun', sans-serif;
            background-color: #fff;
        }
        td input[type="date"] {
            font-size: 10px;
            padding: 1px;
            cursor: pointer;
        }
        td input:focus {
            border-color: #007bff;
            outline: none;
            background-color: #f4f8ff;
        }
        /* ตกแต่งแถวรวมน้ำหนักท้ายตาราง */
        .total-row {
            font-weight: bold;
            background-color: #fffde7;
        }
        .total-row td {
            border-top: 1.5px solid #000000;
        }
        .total-label {
            text-align: left;
            padding-left: 5px;
        }
        .footer-line {
            margin-top: 10px;
            border-bottom: 1.5px dotted #999;
            width: 100%;
        }

        /* ----------------------------------------------------
           🔥 การตั้งค่าการพิมพ์สำหรับดาวน์โหลดออกเป็น PDF (A5)
        ---------------------------------------------------- */
        @media print {
            body { padding: 0; background: none; }
            .action-bar { display: none !important; }
            .document-page { box-shadow: none; padding: 0; }
            td input { 
                border: none !important; 
                background: transparent !important; 
                appearance: none;
                -webkit-appearance: none;
            }
            .total-row td {
                background-color: #fffde7 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="action-bar">
        <button class="btn btn-save" onclick="saveData()">บันทึกข้อมูล</button>
        <button class="btn btn-pdf" onclick="exportToPDFA5()">ดาวน์โหลดเป็น PDF (ขนาด A5)</button>
    </div>

    <div class="document-page" id="pdf-content">
        <div class="form-header">
            <h1 class="form-title">ใบบันทึกสรุปน้ำหนักข้าวโพด</h1>
        </div>

        <div class="meta-container">
            <div class="meta-field" style="flex: 1;">
                <label>เลขที่สมาชิก</label>
                <input type="text" id="member_id" placeholder="......................................................">
            </div>
            <div class="meta-field" style="flex: 2;">
                <label>ชื่อ-นามสกุล</label>
                <input type="text" id="member_name" placeholder="....................................................................................................">
            </div>
        </div>

        <div class="grid-layout">
            <div class="table-section">
                <div class="section-title">ข้าวโพดตัวเล็ก</div>
                <table>
                    <thead>
                        <tr>
                            <th style="width: 12%;">ลำดับ</th>
                            <th style="width: 36%;">ว/ด/ป</th>
                            <th style="width: 26%;">จำนวนตะกร้า</th>
                            <th style="width: 26%;">น.น.ข้าวโพด</th>
                        </tr>
                    </thead>
                    <tbody id="small-corn-body"></tbody>
                    <tr class="total-row">
                        <td colspan="2" class="total-label">รวมน้ำหนัก</td>
                        <td id="small-total-baskets">0</td>
                        <td id="small-total-weight">0.00</td>
                    </tr>
                </table>
            </div>

            <div class="table-section">
                <div class="section-title">ข้าวโพดตัวใหญ่</div>
                <table>
                    <thead>
                        <tr>
                            <th style="width: 12%;">ลำดับ</th>
                            <th style="width: 34%;">ว/ด/ป</th>
                            <th style="width: 27%;">จำนวนตะกร้า</th>
                            <th style="width: 27%;">น.น.ข้าวโพด</th>
                        </tr>
                    </thead>
                    <tbody id="big-corn-body"></tbody>
                    <tr class="total-row">
                        <td colspan="2" class="total-label">รวมน้ำหนัก</td>
                        <td id="big-total-baskets">0</td>
                        <td id="big-total-weight">0.00</td>
                    </tr>
                </table>
            </div>
        </div>
        
        <div class="footer-line"></div>
    </div>
</div>

<script>
    // รันสคริปต์สร้างแถวตารางกรอกข้อมูลจำนวน 12 บรรทัด และเปิดใช้ช่องประเภท date สำหรับคลิกเปิดปฏิทินป๊อปอัพ
    function generateTableRows(tbodyId, typePrefix) {
        const tbody = document.getElementById(tbodyId);
        for (let i = 1; i <= 12; i++) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${i}</td>
                <td><input type="date" class="${typePrefix}-date"></td>
                <td><input type="number" class="${typePrefix}-basket" oninput="calculateSummaryTotals()" min="0"></td>
                <td><input type="number" class="${typePrefix}-weight" oninput="calculateSummaryTotals()" step="0.01" min="0"></td>
            `;
            tbody.appendChild(tr);
        }
    }

    // ฟังก์ชันในการประมวลผลคำนวณและรวมยอดน้ำหนักรวมและจำนวนตะกร้าแบบอัตโนมัติ
    function calculateSummaryTotals() {
        let smallBaskets = 0, smallWeight = 0;
        document.querySelectorAll('.small-basket').forEach(input => smallBaskets += Number(input.value) || 0);
        document.querySelectorAll('.small-weight').forEach(input => smallWeight += Number(input.value) || 0);
        document.getElementById('small-total-baskets').innerText = smallBaskets;
        document.getElementById('small-total-weight').innerText = smallWeight.toFixed(2);

        let bigBaskets = 0, bigWeight = 0;
        document.querySelectorAll('.big-basket').forEach(input => bigBaskets += Number(input.value) || 0);
        document.querySelectorAll('.big-weight').forEach(input => bigWeight += Number(input.value) || 0);
        document.getElementById('big-total-baskets').innerText = bigBaskets;
        document.getElementById('big-total-weight').innerText = bigWeight.toFixed(2);
    }

    // ฟังก์ชันสั่งการดาวน์โหลดและบังคับล็อกโครงสร้างหน้าไฟล์ PDF ให้อยู่บนกระดาษขนาด A5 แนวนอนจำนวน 1 หน้าถ้วนพอดี
    function exportToPDFA5() {
        const element = document.getElementById('pdf-content');
        const memberId = document.getElementById('member_id').value.trim();
        const fileName = memberId ? `สรุปน้ำหนัก_A5_สมาชิก_${memberId}.pdf` : 'ใบบันทึกสรุปน้ำหนักข้าวโพด_A5.pdf';

        const opt = {
            margin:       [5, 6, 5, 6], // ขอบกระดาษหน่วยมิลลิเมตร (บน, ซ้าย, ล่าง, ขวา) ย่อขอบลงเพื่อให้เหมาะกับ A5
            filename:     fileName,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2.5, useCORS: true, logging: false }, // ตั้งค่าสเกลความชัดสูงขึ้นเพื่อไม่ให้ตัวหนังสือเล็กแล้วเบลอ
            jsPDF:        { unit: 'mm', format: 'a5', orientation: 'landscape' } // 🔥 ตั้งค่าเปลี่ยนขนาดกระดาษเป็นขนาด A5 แนวนอน
        };

        html2pdf().set(opt).from(element).save();
    }

    function saveData() {
        alert("บันทึกข้อมูลตารางขนาด A5 เรียบร้อยแล้ว สามารถกดปุ่มเพื่อรับไฟล์ PDF ได้ทันที");
    }

    window.onload = function() {
        generateTableRows('small-corn-body', 'small');
        generateTableRows('big-corn-body', 'big');
    };
</script>

</body>
</html>
